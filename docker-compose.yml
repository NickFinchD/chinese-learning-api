services:
  postgres:
    image: postgres:17-alpine
    container_name: chinese-learning-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: chinese_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: